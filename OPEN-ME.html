<!DOCTYPE html>
<html>
<head>
    <title>Fathima's Biryani House - Click to Open</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff4500, #ff6b35);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #ff4500;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 20px 40px;
            background: linear-gradient(135deg, #ff4500, #ff6b35);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍛 Fathima's Biryani House</h1>
        <p>Your website is ready!</p>
        <a href="index.html" class="btn">OPEN WEBSITE</a>
    </div>
</body>
</html>
